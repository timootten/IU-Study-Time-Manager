<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="You are currently offline. Study Time Manager is still available for cached pages. Reconnect to sync your study data and unlock all features."
    />
    <script>
      // PWA-Viewport-Anpassung: Zoom nur in PWA deaktivieren (natives App-Gefühl)
      // Muss synchron im <head> laufen, um FOUC zu vermeiden
      (function () {
        var isPWA =
          window.matchMedia("(display-mode: standalone)").matches ||
          ("standalone" in navigator && navigator.standalone === true);

        if (isPWA) {
          var viewport = document.querySelector('meta[name="viewport"]');
          if (viewport) {
            viewport.setAttribute(
              "content",
              "width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1, minimum-scale=1",
            );
          }
        }
      })();
    </script>
    <title>Offline | Study Time Manager</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Manrope, ui-sans-serif, system-ui, sans-serif;
        background: radial-gradient(
          circle at top left,
          #dff4ef 0%,
          #f8f3e8 42%,
          #efe8d8 100%
        );
        color: #19333e;
      }

      main {
        width: min(560px, calc(100% - 2rem));
        border-radius: 20px;
        padding: 2rem;
        border: 1px solid rgba(25, 51, 62, 0.2);
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 20px 42px rgba(26, 57, 70, 0.14);
      }

      h1 {
        margin: 0;
        font-size: clamp(1.6rem, 3.6vw, 2.1rem);
      }

      p {
        margin-top: 0.8rem;
        line-height: 1.5;
      }

      .actions {
        margin-top: 1.4rem;
        display: flex;
        gap: 0.7rem;
        flex-wrap: wrap;
      }

      button,
      a {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      button {
        background: linear-gradient(130deg, #0f8a8d, #136f8d);
        color: #effdfb;
      }

      a {
        background: rgba(255, 255, 255, 0.8);
        color: #19333e;
        border: 1px solid rgba(25, 51, 62, 0.2);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        Study Time Manager is still available for cached pages. Reconnect to
        sync fresh data and unlock all features.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Retry</button>
        <a href="/">Go to home</a>
      </div>
    </main>
  </body>
</html>
